<!DOCTYPE html>
<html>
    <head>
        <title>Milage Tracker</title>
    </head>
    <body>
        <h1>Milage tracker</h1>
        <p>This page is served from an HTML file.</p>

        <a href="/add">Add entry</a>

        <table border="1" cellpadding="6">
            <tr>
                <th>Date</th>
                <th>Miles</th>
                <th>Earnings</th>
                <th>Notes</th>
            </tr>

            {% for entry in entries %}
            <tr>
                <td>{{ entry["date"] }}</td>
                <td>{{ entry["miles"] }}</td>
                <td>{{ entry["earnings"] }}</td>
                <td>{{ entry["notes"] }}</td>
            </tr>
            {% endfor %}
        </table>
    </body>

</html>
