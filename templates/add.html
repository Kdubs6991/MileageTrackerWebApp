{% extends "base.html" %}

{% block title %}Add Entry — Mileage Tracker{% endblock %}

{% block content %}

<section>
    <h2>Add Entry</h2>

    <form method="post">
        <!-- Each label in here becomes a key we can read in Flask later. -->
        <div>
            <label>Date:</label>
            <input type="date" name="date"><br><br>
        </div>

        <div>
            <label>Miles:</label>
            <input type="number" step="0.01" name="miles"><br><br>
        </div>

        <div>
            <label>Earnings ($):</label>
            <input type="number" step="0.01" name="earnings"><br><br>
        </div>

        <div>
            <label>Notes:</label>
            <input type="text" name="notes"><br><br>
        </div>

        <div>
            <button type="submit">Save</button>
            <a href="/">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
